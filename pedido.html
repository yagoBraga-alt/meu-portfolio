<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o meu amor ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; transition: background-color 1s ease; }
    </style>
</head>
<body class="bg-pink-100 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <audio id="musica" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <div id="container" class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full border-4 border-pink-200 z-10">
        <div id="conteudo-inicial">
            <div class="w-32 h-32 mx-auto mb-4 rounded-2xl overflow-hidden border-4 border-pink-100 shadow-md">
                <img src="fotoAnna.png" alt="fotoAnna" class="w-full h-full object-cover">
            </div>
            <h1 class="text-2xl font-bold text-pink-600 mb-6 italic">Yago tem uma pergunta importante...</h1>
            <p class="text-gray-600 mb-8 font-semibold text-lg">Você aceita casar comigo?</p>

            <div class="flex justify-center gap-4">
                <button onclick="aceitou()" 
                    class="bg-pink-500 hover:bg-pink-600 text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg transition-transform active:scale-95">
                    SIM!
                </button>

                <button id="btnNao" onmouseover="fuga()" onclick="fuga()"
                    class="bg-gray-300 text-gray-700 px-8 py-3 rounded-full font-bold text-lg shadow-md transition-all duration-200 z-50">
                    Não
                </button>
            </div>
        </div>

        <div id="mensagem-sucesso" class="hidden">
            <span class="text-6xl mb-4 block animate-bounce">💖</span>
            <h2 class="text-3xl font-bold text-pink-600 mb-4">EU TE AMO!</h2>
            <p class="text-gray-600 leading-relaxed font-medium">
                Você me faz a pessoa mais feliz do mundo! <br> Mal posso esperar pelo nosso futuro juntos. ✨
            </p>
        </div>
    </div>

    <script>
        function fuga() {
            const btn = document.getElementById('btnNao');
            
            // Calcula posições aleatórias
            const maxX = window.innerWidth - btn.offsetWidth - 30;
            const maxY = window.innerHeight - btn.offsetHeight - 30;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }

        function aceitou() {
            // Esconde inicial e mostra sucesso
            document.getElementById('conteudo-inicial').classList.add('hidden');
            document.getElementById('mensagem-sucesso').classList.remove('hidden');
            
            // Troca o fundo
            document.body.classList.replace('bg-pink-100', 'bg-pink-300');

            // Inicia a música
            const audio = document.getElementById('musica');
            audio.play().catch(e => console.log("O navegador bloqueou o autoplay, mas a música tentou tocar!"));

            // Chuva de confetes
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
